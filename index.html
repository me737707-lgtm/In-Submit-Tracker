<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Submit Tracker Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0;
            --text-sub: #a0a0a0; --primary: #3700b3; --danger: #cf6679; --success: #03dac6; --border: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        select, input { background: #2c2c2c; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 5px; }
        
        .shift-block { margin-bottom: 30px; }
        .shift-header { font-size: 22px; color: var(--success); margin-bottom: 15px; border-bottom: 2px solid var(--primary); display: inline-block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
        .room-card { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        .room-name { background: #252525; padding: 10px; text-align: center; font-weight: bold; border-bottom: 1px solid var(--border); }
        
        .split-view { display: flex; min-height: 200px; }
        .column { flex: 1; padding: 10px; border-right: 1px solid var(--border); }
        .column:last-child { border-right: none; }
        .col-title { font-size: 14px; text-align: center; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
        
        .user-box { padding: 8px; border-radius: 4px; margin-bottom: 5px; font-size: 12px; border: 1px solid transparent; }
        .not-sub { border-color: rgba(207, 102, 121, 0.3); background: rgba(207, 102, 121, 0.05); }
        .sub { border-color: rgba(3, 218, 198, 0.3); background: rgba(3, 218, 198, 0.05); }
        
        .email { display: block; font-weight: bold; margin-bottom: 2px; }
        .not-sub .email { color: var(--danger); }
        .sub .email { color: var(--success); }
        .meta { color: var(--text-sub); font-size: 10px; }

        .status-dot { height: 10px; width: 10px; background-color: var(--success); border-radius: 50%; display: inline-block; margin-left: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div><span class="status-dot"></span> <b>In Submit Tracker (Live)</b></div>
    <div class="controls">
        <select id="shiftFilter" onchange="renderCurrentData()">
            <option value="all">كل الشيفتات</option>
        </select>
        <input type="date" id="datePicker" onchange="fetchData()">
        <button onclick="fetchData()" style="cursor:pointer; background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:5px;">تحديث يدوي</button>
    </div>
</header>

<div id="content"></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxmz0gT1rUXChCW42soPQXYtcpmir9reKAhnP9xKCvWii0adGkA7glu0WbQwVaAIisG/exec'; 
    let globalData = {};

    window.onload = () => {
        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
        fetchData();
        // تحديث تلقائي كل 5 ثواني
        setInterval(fetchData, 5000);
    };

    async function fetchData() {
        const date = document.getElementById('datePicker').value.split('-').reverse().join('-');
        try {
            const res = await fetch(`${API_URL}?date=${date}`);
            const json = await res.json();
            globalData = json.data;
            updateShiftFilter();
            renderCurrentData();
        } catch (e) { console.error("Update failed"); }
    }

    function updateShiftFilter() {
        const filter = document.getElementById('shiftFilter');
        const currentVal = filter.value;
        filter.innerHTML = '<option value="all">كل الشيفتات</option>';
        Object.keys(globalData).forEach(s => {
            filter.innerHTML += `<option value="${s}" ${s === currentVal ? 'selected' : ''}>شيفت: ${s}</option>`;
        });
    }

    function renderCurrentData() {
        const filter = document.getElementById('shiftFilter').value;
        const content = document.getElementById('content');
        content.innerHTML = '';

        for (const [shift, locations] of Object.entries(globalData)) {
            if (filter !== 'all' && shift !== filter) continue;

            const section = document.createElement('div');
            section.className = 'shift-block';
            section.innerHTML = `<div class="shift-header">شيفت: ${shift}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'grid';

            for (const [loc, type] of Object.entries(locations)) {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-name">${loc}</div>
                    <div class="split-view">
                        <div class="column">
                            <div class="col-title" style="color:var(--danger)">Not Submit (${type.notSubmitted.length})</div>
                            ${type.notSubmitted.map(u => createUserBox(u, 'not-sub')).join('')}
                        </div>
                        <div class="column">
                            <div class="col-title" style="color:var(--success)">Submitted (${type.submitted.length})</div>
                            ${type.submitted.map(u => createUserBox(u, 'sub')).join('')}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
            section.appendChild(grid);
            content.appendChild(section);
        }
    }

    function createUserBox(u, className) {
        return `
            <div class="user-box ${className}">
                <span class="email">${u.email}</span>
                <span class="meta">TL: ${u.tl} | PC: ${u.pc}</span>
            </div>
        `;
    }
</script>
</body>
</html>
