<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Submit Tracker | Teams Live Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0f0f0f; 
            --bg-card: #1a1a1a; 
            --text-main: #e0e0e0;
            --text-sub: #b0b0b0; 
            --primary: #6200ee; 
            --danger: #ff5252; 
            --success: #00e676; 
            --border: #2d2d2d;
            --header-bg: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; 
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--header-bg); padding: 15px 25px; border-radius: 12px; 
            margin-bottom: 30px; border: 1px solid var(--border); position: sticky; 
            top: 10px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .live-indicator { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .status-dot { height: 10px; width: 10px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .controls { display: flex; gap: 10px; }
        select, input { background: #2c2c2c; color: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; outline: none; font-size: 14px; }

        .location-title { color: var(--success); font-size: 26px; margin: 40px 0 15px 0; display: flex; align-items: center; gap: 10px; }
        
        .location-summary { display: flex; gap: 20px; margin-bottom: 25px; padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; border: 1px solid var(--border); }
        .summary-item { display: flex; flex-direction: column; gap: 5px; }
        .summary-label { font-size: 11px; color: var(--text-sub); text-transform: uppercase; }
        .summary-value { font-size: 18px; font-weight: bold; }
        .value-sub { color: var(--success); }
        .value-not { color: var(--danger); }
        .progress-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .progress-bar-bg { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); transition: width 0.5s ease; }

        .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 20px; }
        .team-card { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        
        .team-header { 
            background: #252525; padding: 12px 15px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .team-header:hover { background: #2d2d2d; }
        .tl-info { display: flex; flex-direction: column; gap: 2px; }
        .team-name { color: #fff; font-size: 15px; font-weight: bold; }
        
        /* عداد خارجي للـ TL */
        .tl-badge-container { display: flex; gap: 8px; font-size: 11px; font-weight: bold; }
        .badge { padding: 2px 8px; border-radius: 4px; }
        .badge-done { background: rgba(0, 230, 118, 0.15); color: var(--success); border: 1px solid rgba(0, 230, 118, 0.3); }
        .badge-not { background: rgba(255, 82, 82, 0.15); color: var(--danger); border: 1px solid rgba(255, 82, 82, 0.3); }

        .fa-chevron-down { transition: transform 0.3s; color: var(--text-sub); }
        .team-card.active .fa-chevron-down { transform: rotate(180deg); }

        .team-content { display: none; padding: 15px; border-top: 1px solid var(--border); }
        .team-card.active .team-content { display: flex; }

        .split-view { display: flex; width: 100%; gap: 10px; }
        .column { flex: 1; }
        .col-title { font-size: 11px; font-weight: bold; text-align: center; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px;}

        .user-box { padding: 8px; border-radius: 6px; margin-bottom: 6px; font-size: 12px; background: rgba(255,255,255,0.02); }
        .not-sub-box { border-left: 3px solid var(--danger); }
        .sub-box { border-left: 3px solid var(--success); }
        .u-email { display: block; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
        .not-sub-box .u-email { color: var(--danger); }
        .sub-box .u-email { color: var(--success); }
        .u-meta { font-size: 10px; color: var(--text-sub); }

        #loader { text-align: center; padding: 50px; font-size: 18px; color: var(--text-sub); }
        .shift-tag { background: var(--primary); padding: 4px 15px; border-radius: 20px; font-size: 16px; font-weight: bold; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div class="live-indicator">
        <div class="status-dot"></div>
        <span>IN SUBMIT TRACKER (LIVE)</span>
    </div>
    <div class="controls">
        <select id="shiftFilter" onchange="renderData()"><option value="all">All Shifts</option></select>
        <select id="locFilter" onchange="renderData()"><option value="all">All Locations</option></select>
        <input type="date" id="datePicker" onchange="fetchData()">
    </div>
</header>

<div id="loader"><i class="fas fa-spinner fa-spin"></i> Syncing with Google Sheets...</div>
<div id="dashboard"></div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxmz0gT1rUXChCW42soPQXYtcpmir9reKAhnP9xKCvWii0adGkA7glu0WbQwVaAIisG/exec';
    let rawData = {};
    let openTeams = new Set(); 

    window.onload = () => {
        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
        fetchData();
        setInterval(fetchData, 5000);
    };

    async function fetchData() {
        const date = document.getElementById('datePicker').value.split('-').reverse().join('-');
        try {
            const res = await fetch(`${API_URL}?date=${date}`);
            const json = await res.json();
            rawData = json.data;
            updateFilters();
            renderData();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error("Update failed"); }
    }

    function updateFilters() {
        const sFilter = document.getElementById('shiftFilter');
        const lFilter = document.getElementById('locFilter');
        const sVal = sFilter.value, lVal = lFilter.value;
        let shifts = new Set(), locs = new Set();
        Object.keys(rawData).forEach(s => {
            shifts.add(s);
            Object.keys(rawData[s]).forEach(l => locs.add(l));
        });
        sFilter.innerHTML = '<option value="all">All Shifts</option>';
        shifts.forEach(s => sFilter.innerHTML += `<option value="${s}" ${s==sVal?'selected':''}>Shift: ${s}</option>`);
        lFilter.innerHTML = '<option value="all">All Locations</option>';
        locs.forEach(l => lFilter.innerHTML += `<option value="${l}" ${l==lVal?'selected':''}>${l}</option>`);
    }

    // تعديل: فتح القائمة المنسدلة للـ TL المختار فقط
    function toggleTeam(tlID) {
        const card = document.getElementById(tlID);
        if (card.classList.contains('active')) {
            card.classList.remove('active');
            openTeams.delete(tlID);
        } else {
            card.classList.add('active');
            openTeams.add(tlID);
        }
    }

    function renderData() {
        const sF = document.getElementById('shiftFilter').value;
        const lF = document.getElementById('locFilter').value;
        const container = document.getElementById('dashboard');
        container.innerHTML = '';

        for (const [shift, locations] of Object.entries(rawData)) {
            if (sF !== 'all' && shift !== sF) continue;

            const shiftWrap = document.createElement('div');
            shiftWrap.innerHTML = `<div class="shift-tag">SHIFT: ${shift}</div>`;

            for (const [locName, teams] of Object.entries(locations)) {
                if (lF !== 'all' && locName !== lF) continue;

                let totalSub = 0, totalNotSub = 0;
                for (const t of Object.values(teams)) {
                    totalSub += t.submitted.length;
                    totalNotSub += t.notSubmitted.length;
                }
                let total = totalSub + totalNotSub;
                let percent = total > 0 ? Math.round((totalSub / total) * 100) : 0;

                const locDiv = document.createElement('div');
                locDiv.innerHTML = `
                    <div class="location-title"><i class="fas fa-map-marker-alt"></i> ${locName}</div>
                    <div class="location-summary">
                        <div class="summary-item"><span class="summary-label">Submitted</span><span class="summary-value value-sub">${totalSub}</span></div>
                        <div class="summary-item"><span class="summary-label">Not Submit</span><span class="summary-value value-not">${totalNotSub}</span></div>
                        <div class="progress-container">
                            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:3px">
                                <span>COMPLETION RATE</span><span>${percent}%</span>
                            </div>
                            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percent}%"></div></div>
                        </div>
                    </div>
                `;

                const teamGrid = document.createElement('div');
                teamGrid.className = 'teams-grid';

                for (const [tlName, stats] of Object.entries(teams)) {
                    const tlID = `card-${shift}-${locName}-${tlName}`.replace(/\s+/g, '-');
                    const isActive = openTeams.has(tlID) ? 'active' : '';

                    const card = document.createElement('div');
                    card.className = `team-card ${isActive}`;
                    card.id = tlID;
                    card.innerHTML = `
                        <div class="team-header" onclick="toggleTeam('${tlID}')">
                            <div class="tl-info">
                                <span class="team-name"><i class="fas fa-user-tie"></i> ${tlName}</span>
                                <div class="tl-badge-container">
                                    <span class="badge badge-done">Done: ${stats.submitted.length}</span>
                                    <span class="badge badge-not">Not: ${stats.notSubmitted.length}</span>
                                </div>
                            </div>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="team-content">
                            <div class="split-view">
                                <div class="column">
                                    <div class="col-title" style="color:var(--danger)">Not Submit (${stats.notSubmitted.length})</div>
                                    ${stats.notSubmitted.map(u => `<div class="user-box not-sub-box"><span class="u-email">${u.email}</span><span class="u-meta">PC: ${u.pc}</span></div>`).join('')}
                                </div>
                                <div class="column">
                                    <div class="col-title" style="color:var(--success)">Submitted (${stats.submitted.length})</div>
                                    ${stats.submitted.map(u => `<div class="user-box sub-box"><span class="u-email">${u.email}</span><span class="u-meta">PC: ${u.pc}</span></div>`).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    teamGrid.appendChild(card);
                }
                locDiv.appendChild(teamGrid);
                shiftWrap.appendChild(locDiv);
            }
            container.appendChild(shiftWrap);
        }
    }
</script>
</body>
</html>
