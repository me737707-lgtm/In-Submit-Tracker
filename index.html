<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Submit Tracker | Teams Live Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0f0f0f; 
            --bg-card: #1a1a1a; 
            --text-main: #e0e0e0;
            --text-sub: #b0b0b0; 
            --primary: #6200ee; 
            --danger: #ff5252; 
            --success: #00e676; 
            --border: #2d2d2d;
            --header-bg: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
        }

        /* Header Style */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--header-bg); 
            padding: 15px 25px; 
            border-radius: 12px; 
            margin-bottom: 30px;
            border: 1px solid var(--border);
            position: sticky;
            top: 10px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .live-indicator { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .status-dot { 
            height: 10px; width: 10px; background: var(--success); 
            border-radius: 50%; box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .controls { display: flex; gap: 10px; }
        select, input { 
            background: #2c2c2c; color: white; border: 1px solid var(--border); 
            padding: 8px 12px; border-radius: 6px; outline: none; font-size: 14px;
        }

        /* Location Section */
        .location-title {
            color: var(--success);
            font-size: 26px;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Teams Grid */
        .teams-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); 
            gap: 25px; 
        }

        /* Team Card Style */
        .team-card { 
            background: var(--bg-card); 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .team-header { 
            background: #252525; 
            padding: 12px 15px; 
            font-weight: bold; 
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-name { color: #fff; font-size: 16px; }
        .team-count { font-size: 12px; color: var(--text-sub); }

        .split-view { display: flex; flex: 1; }
        .column { flex: 1; padding: 15px; border-right: 1px solid var(--border); }
        .column:last-child { border-right: none; }

        .col-title { 
            font-size: 12px; font-weight: bold; text-align: center; 
            margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* User Box Style */
        .user-box { 
            padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; 
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
        }
        .not-sub-box { border-left: 3px solid var(--danger); background: rgba(255, 82, 82, 0.05); }
        .sub-box { border-left: 3px solid var(--success); background: rgba(0, 230, 118, 0.05); }

        .u-email { display: block; font-weight: bold; margin-bottom: 2px; }
        .not-sub-box .u-email { color: var(--danger); }
        .sub-box .u-email { color: var(--success); }
        .u-meta { font-size: 10px; color: var(--text-sub); }

        #loader { text-align: center; padding: 50px; font-size: 18px; color: var(--text-sub); }
        
        /* Shift Tag */
        .shift-tag {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 18px;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<header>
    <div class="live-indicator">
        <div class="status-dot"></div>
        <span>IN SUBMIT TRACKER (LIVE)</span>
    </div>
    <div class="controls">
        <select id="shiftFilter" onchange="renderData()"><option value="all">All Shifts</option></select>
        <select id="locFilter" onchange="renderData()"><option value="all">All Locations</option></select>
        <input type="date" id="datePicker" onchange="fetchData()">
    </div>
</header>

<div id="loader"><i class="fas fa-spinner fa-spin"></i> Syncing with Google Sheets...</div>
<div id="dashboard"></div>

<script>
    // 1. استبدل الرابط برابط الـ Web App الخاص بك
    const API_URL = 'https://script.google.com/macros/s/AKfycbxmz0gT1rUXChCW42soPQXYtcpmir9reKAhnP9xKCvWii0adGkA7glu0WbQwVaAIisG/exec';
    let rawData = {};

    window.onload = () => {
        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
        fetchData();
        setInterval(fetchData, 5000); // تحديث تلقائي كل 5 ثواني
    };

    async function fetchData() {
        const date = document.getElementById('datePicker').value.split('-').reverse().join('-');
        try {
            const res = await fetch(`${API_URL}?date=${date}`);
            const json = await res.json();
            rawData = json.data;
            updateFilters();
            renderData();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error("Update failed"); }
    }

    function updateFilters() {
        const sFilter = document.getElementById('shiftFilter');
        const lFilter = document.getElementById('locFilter');
        const sVal = sFilter.value;
        const lVal = lFilter.value;

        let shifts = new Set();
        let locs = new Set();

        Object.keys(rawData).forEach(s => {
            shifts.add(s);
            Object.keys(rawData[s]).forEach(l => locs.add(l));
        });

        sFilter.innerHTML = '<option value="all">All Shifts</option>';
        shifts.forEach(s => sFilter.innerHTML += `<option value="${s}" ${s==sVal?'selected':''}>Shift: ${s}</option>`);

        lFilter.innerHTML = '<option value="all">All Locations</option>';
        locs.forEach(l => lFilter.innerHTML += `<option value="${l}" ${l==lVal?'selected':''}>${l}</option>`);
    }

    function renderData() {
        const sF = document.getElementById('shiftFilter').value;
        const lF = document.getElementById('locFilter').value;
        const container = document.getElementById('dashboard');
        container.innerHTML = '';

        for (const [shift, locations] of Object.entries(rawData)) {
            if (sF !== 'all' && shift !== sF) continue;

            const shiftWrap = document.createElement('div');
            shiftWrap.innerHTML = `<div class="shift-tag">SHIFT: ${shift}</div>`;

            for (const [locName, teams] of Object.entries(locations)) {
                if (lF !== 'all' && locName !== lF) continue;

                const locHeader = document.createElement('div');
                locHeader.className = 'location-title';
                locHeader.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${locName}`;
                shiftWrap.appendChild(locHeader);

                const teamGrid = document.createElement('div');
                teamGrid.className = 'teams-grid';

                for (const [tlName, stats] of Object.entries(teams)) {
                    const card = document.createElement('div');
                    card.className = 'team-card';
                    card.innerHTML = `
                        <div class="team-header">
                            <span class="team-name"><i class="fas fa-users"></i> ${tlName}</span>
                            <span class="team-count">Members: ${stats.submitted.length + stats.notSubmitted.length}</span>
                        </div>
                        <div class="split-view">
                            <div class="column">
                                <div class="col-title" style="color:var(--danger)">Not Submitted (${stats.notSubmitted.length})</div>
                                ${stats.notSubmitted.map(u => `
                                    <div class="user-box not-sub-box">
                                        <span class="u-email">${u.email}</span>
                                        <span class="u-meta">PC: ${u.pc}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="column">
                                <div class="col-title" style="color:var(--success)">Submitted (${stats.submitted.length})</div>
                                ${stats.submitted.map(u => `
                                    <div class="user-box sub-box">
                                        <span class="u-email">${u.email}</span>
                                        <span class="u-meta">PC: ${u.pc}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    teamGrid.appendChild(card);
                }
                shiftWrap.appendChild(teamGrid);
            }
            container.appendChild(shiftWrap);
        }
    }
</script>

</body>
</html>
